name: Deploy

on:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: terraform-linters/setup-tflint@v4
      - name: Init TFLint
        run: tflint --init
        working-directory: infra
      - name: Run TFLint
        run: tflint --chdir=infra

  plan:
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Zip Lambda source
        run: zip -j lambda.zip src/handler.py
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ap-southeast-2
      - name: Bootstrap S3 state bucket
        run: |
          aws s3api create-bucket \
            --bucket agent-os-poc \
            --region ap-southeast-2 \
            --create-bucket-configuration LocationConstraint=ap-southeast-2 2>/dev/null || true
          aws s3api put-bucket-versioning \
            --bucket agent-os-poc \
            --versioning-configuration Status=Enabled
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.10"
      - name: Terraform Init
        working-directory: infra
        run: terraform init
      - name: Terraform Plan
        working-directory: infra
        run: terraform plan -out=tfplan -var="lambda_zip_path=../lambda.zip"
      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: infra/tfplan

  apply:
    needs: plan
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Zip Lambda source
        run: zip -j lambda.zip src/handler.py
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ap-southeast-2
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.10"
      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: infra/
      - name: Terraform Init
        working-directory: infra
        run: terraform init
      - name: Terraform Apply
        working-directory: infra
        run: terraform apply tfplan
